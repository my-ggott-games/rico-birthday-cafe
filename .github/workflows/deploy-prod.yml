name: Deploy to VM (prod)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy prod over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            cd /home/deploy/app_prod
            git fetch origin
            git checkout main
            git pull origin main

            cd /home/deploy
            docker compose -f deploy-compose.yml up -d --build app-prod

            docker ps

            # prod health check with retry
            for i in {1..20}; do
              if curl -fsS http://localhost:8000/actuator/health; then
                echo "Prod health check passed"
                exit 0
              fi
              echo "Waiting for prod app to be ready... ($i/20)"
              sleep 5
            done

            echo "Prod health check failed"
            docker logs rico-backend-prod --tail=100
            exit 1
