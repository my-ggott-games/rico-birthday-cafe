name: Deploy to VM (dev)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy dev over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            cd /home/deploy/app
            git fetch origin
            git checkout dev
            git pull origin dev

            cd /home/deploy
            docker compose -f deploy-compose.yml up -d --build app-dev

            docker ps

            # dev health check with retry
            for i in {1..20}; do
              if curl -fsS http://localhost:8001/actuator/health; then
                echo "Dev health check passed"
                exit 0
              fi
              echo "Waiting for dev app to be ready... ($i/20)"
              sleep 5
            done

            echo "Dev health check failed"
            docker logs rico-backend-dev --tail=100
            exit 1
