name: Deploy to VM (dev)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy dev over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            # dev 코드 갱신
            cd /home/deploy/app
            git fetch origin
            git checkout dev
            git pull origin dev

            # dev 서비스만 재배포
            cd /home/deploy
            docker compose -f deploy-compose.yml up -d --build app-dev

            # 확인
            docker ps
            curl http://localhost:8001/actuator/health
