spring:
  datasource:
    url: jdbc:h2:mem:birthday-cafe-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-jwt-secret-for-build-validation-only

app:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
