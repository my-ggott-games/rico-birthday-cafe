spring:
  application:
    name: birthday-cafe
  datasource:
    # Priority:
    # 1) SPRING_DATASOURCE_*
    # 2) Render/Railway JDBC URL vars (avoid non-JDBC DATABASE_URL parsing issues)
    # 3) SUPABASE_DB_* (recommended for Supabase)
    # 4) Generic DATABASE_* fallbacks
    url: ${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:${DATABASE_JDBC_URL:${SUPABASE_DB_JDBC_URL:jdbc:postgresql://localhost:5432/birthday_cafe}}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:${SUPABASE_DB_USER:postgres}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:${SUPABASE_DB_PASSWORD:password}}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}
  admin:
    # Prefer ADMIN_PASSCODE_HASH (bcrypt). ADMIN_PASSCODE is also supported as a
    # plain-text fallback for deployments where env hashing was misconfigured.
    passcode: ${ADMIN_PASSCODE:}
    passcode-hash: ${ADMIN_PASSCODE_HASH:$2a$10$64tlOiaOJWsxVOkt5FZFee2xdOdKdukbdNsD36eUiHJLQgr43.uGy}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true
